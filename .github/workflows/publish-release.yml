---
name: Publish Release
permissions:
  contents: write
  id-token: write

concurrency:
  group: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}
jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: "go.mod"
    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@v6.1.0
      with:
        version: latest
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Configure AWS credentials
      if: github.repository == 'boltz-bio/boltz-compute-api-cli' && startsWith(github.ref, 'refs/tags/v')
      uses: aws-actions/configure-aws-credentials@v5
      with:
        role-to-assume: arn:aws:iam::421498156696:role/boltz-platform-cli-install-github-actions-irsa
        aws-region: us-east-1
    - name: Publish install assets
      if: github.repository == 'boltz-bio/boltz-compute-api-cli' && startsWith(github.ref, 'refs/tags/v')
      env:
        BOLTZ_API_INSTALL_CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.BOLTZ_API_INSTALL_CLOUDFRONT_DISTRIBUTION_ID }}
      run: ./scripts/publish-install-assets.sh
